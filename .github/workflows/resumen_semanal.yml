name: Resumen Semanal Portafolio

on:
  schedule:
    - cron: "30 22 * * 5"   # Viernes 5:30 p.m. Perú (UTC-5)
  workflow_dispatch:

jobs:
  resumen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip

      - name: Ejecutar resumen semanal
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python resumen_semanal.py
