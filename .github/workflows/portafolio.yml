name: Portafolio Automático

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"    # Diario 5:00 pm Perú
    - cron: "0 22 * * 5"    # Viernes semanal
    - cron: "0 12 1 * *"    # Día 1 de cada mes (7 am Perú)

jobs:
  diario:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install yfinance matplotlib

      - name: Ejecutar evaluador diario
        run: python evaluador_diario.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

  semanal:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 22 * * 5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install yfinance

      - name: Ejecutar resumen semanal
        run: python resumen_semanal.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

  mensual:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 12 1 * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install matplotlib

      - name: Ejecutar resumen mensual
        run: python resumen_mensual.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
