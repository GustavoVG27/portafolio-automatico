name: Evaluador Diario Portafolio

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"   # 5:00 p.m. Perú (UTC-5)

jobs:
  evaluar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Ejecutar evaluador
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python evaluador_diario.py

      - name: Commit y push CSV actualizado
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add historial_portafolio.csv
          git diff --cached --quiet || git commit -m "Actualizar historial_portafolio - ${{ github.run_number }}"
          git push
