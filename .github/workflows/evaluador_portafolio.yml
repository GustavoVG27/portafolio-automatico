name: Evaluador Diario Portafolio

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"   # 5:00 p.m. Perú (UTC-5)

jobs:
  evaluar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install yfinance google-api-python-client google-auth

      - name: Ejecutar evaluador
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python evaluador.py

      - name: Subir CSV a Google Drive
        env:
          GOOGLE_DRIVE_KEY: ${{ secrets.GOOGLE_DRIVE_KEY }}
        run: python subir_drive.py

