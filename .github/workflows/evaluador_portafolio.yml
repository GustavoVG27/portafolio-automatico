name: Evaluador Diario Portafolio

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"   # 5:00 p.m. Perú (UTC-5)

jobs:
  evaluar:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2️⃣ Configurar Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      # 4️⃣ Ejecutar el evaluador diario
      - name: Ejecutar evaluador
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python evaluador_diario.py

      # 5️⃣ Commit y push CSV actualizado
      - name: Commit y push CSV actualizado
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          # Usar token para autenticación HTTPS
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add historial_portafolio.csv
          git diff --cached --quiet || git commit -m "Actualizar historial_portafolio - ${{ github.run_number }}"
          git push origin HEAD:main

